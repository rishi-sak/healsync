<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Medicine - HealSync</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="add-medicine-page">
    <div class="container">
      <a href="dashboard" class="back-link">← Back to Dashboard</a>
      <h2>Add Medicine</h2>
      <form action="AddMedicine" method="post">
        <label for="medicineName">Medicine Name</label>
        <input
          type="text"
          id="medicineName"
          name="medicineName"
          placeholder="Add your Medicine Name"
        />

        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" name="startDate" required />

        <label for="endDate">End Date</label>
        <input type="date" id="endDate" name="endDate" required />

        <label for="dosageCount">Number of Dosages per Day</label>
        <input
          type="number"
          id="dosageCount"
          name="dosageCount"
          placeholder="Dose Per Day"
          min="1"
          max="6"
          required
        />

        <label>Medicine Time</label>
        <div id="timeFields">
          <div class="time-field">
            <input type="time" name="time[]" required />
            <button type="button" class="add-btn" onclick="addTimeField()">
              +
            </button>
          </div>
        </div>

        <label for="reminderType">Reminder Type</label>
        <select id="reminderType" name="reminderType" required>
          <option value="">Select</option>
          <option value="Notification">Notification</option>
        </select>

        <label for="dosageInstructions">Dosage Instructions (Optional)</label>
        <textarea
          id="dosageInstructions"
          name="dosageInstructions"
          rows="3"
          placeholder="e.g., Take after breakfast"
        ></textarea>

        <button type="submit">Add Medicine</button>
      </form>
    </div>

    <script>
      // ✅ Add time field function with max limit
      function addTimeField() {
        const container = document.getElementById("timeFields");
        const existingFields = container.querySelectorAll(
          'input[name="time[]"]',
        ).length;

        if (existingFields >= 6) {
          alert("Maximum 6 time slots allowed.");
          return;
        }

        const div = document.createElement("div");
        div.className = "time-field";
        div.innerHTML = `<input type="time" name="time[]" required>
                     <button type="button" class="remove-btn" onclick="removeTimeField(this)">&#10006;</button>`;
        container.appendChild(div);
      }

      function removeTimeField(button) {
        button.parentNode.remove();
      }

      // ✅ Generate time slots automatically based on dosage count
      document
        .getElementById("dosageCount")
        .addEventListener("input", function () {
          let count = parseInt(this.value) || 0;

          if (count > 6) {
            count = 6;
            this.value = 6;
            alert("Maximum allowed dosage count is 6.");
          }

          const container = document.getElementById("timeFields");
          container.innerHTML = ""; // clear old fields

          for (let i = 1; i < count; i++) {
            const div = document.createElement("div");
            div.className = "time-field";
            div.innerHTML = `<input type="time" name="time[]" required>
                       <button type="button" class="remove-btn" onclick="removeTimeField(this)">&#10006;</button>`;
            container.appendChild(div);
          }

          // ✅ Always include one "Add" button at the end
          const addDiv = document.createElement("div");
          addDiv.className = "time-field";
          addDiv.innerHTML = `<input type="time" name="time[]" required>
                        <button type="button" class="add-btn" onclick="addTimeField()">+</button>`;
          container.appendChild(addDiv);
        });
      // ✅ Date validations (unchanged)
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      const formattedToday = `${yyyy}-${mm}-${dd}`;

      const startDateInput = document.getElementById("startDate");
      const endDateInput = document.getElementById("endDate");

      startDateInput.setAttribute("min", formattedToday);
      endDateInput.setAttribute("min", formattedToday);

      document
        .querySelector("form")
        .addEventListener("submit", function (event) {
          const startDate = startDateInput.value;
          const endDate = endDateInput.value;

          if (startDate < formattedToday) {
            alert("Start Date cannot be before today.");
            startDateInput.focus();
            event.preventDefault();
            return;
          }

          if (endDate < startDate) {
            alert("End Date cannot be before Start Date.");
            endDateInput.focus();
            event.preventDefault();
            return;
          }
        });
    </script>
  </body>
</html>
